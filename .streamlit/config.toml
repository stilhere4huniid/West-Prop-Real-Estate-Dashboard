[server]
port = 8501
address = "0.0.0.0"
enableCORS = false
enableXsrfProtection = false
enableWebsocketCompression = true
enableStaticServing = true

[browser]
serverAddress = ""
serverPort = 8501

[runner]
fixMatplotlib = true
magicEnabled = true

[theme]
base = "light"
primaryColor = "#3498db"
backgroundColor = "#f8f9fa"
secondaryBackgroundColor = "#e9ecef"
textColor = "#2c3e50"
font = "sans serif"
